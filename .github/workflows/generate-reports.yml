name: Multi-Repo Code Quality Audits

on:
  schedule:
    - cron: '0 8 * * 1' # Runs at 8:00 AM UTC every Monday
  workflow_dispatch: # Allows manual trigger

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  copilot-requests: write

jobs:
  audit-quickstart-openshift:
    name: Audit quickstart-openshift
    uses: bcgov/action-repo-reporter/.github/workflows/fds-project-audit.prompt.lock.yml@fix/asynchronous-audits
    with:
      target_repository: bcgov/quickstart-openshift
    secrets: inherit

  audit-pubcode:
    name: Audit pubcode
    uses: bcgov/action-repo-reporter/.github/workflows/fds-project-audit.prompt.lock.yml@fix/asynchronous-audits
    with:
      target_repository: bcgov/pubcode
    secrets: inherit

  audit-actions:
    name: Audit actions
    uses: bcgov/action-repo-reporter/.github/workflows/fds-project-audit.prompt.lock.yml@fix/asynchronous-audits
    with:
      target_repository: bcgov/actions
    secrets: inherit

  # Downstream job that has contents: write to collect the reports and commit them
  commit-reports:
    name: Collect and Commit Reports
    needs: [audit-quickstart-openshift, audit-pubcode, audit-actions]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Central Reporting Repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Download All Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec80cca3 # v4.2.0

      - name: Organize Reports
        run: |
          set -euo pipefail
          mkdir -p reports
          
          # Print the list of downloaded files to help verify
          echo "=== Downloaded Artifact Files ==="
          find . -type f
          
          # Move all quality assessments to the reports folder
          find . -name "*-code-quality-assessment.md" -exec cp -v {} reports/ \;

      - name: Commit and Push Reports
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update code quality assessments"
            git push origin HEAD
          fi
